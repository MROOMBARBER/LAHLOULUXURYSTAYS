<!DOCTYPE html>
<html lang="fr">
<head>

    <title>LAHLOU LUXURY STAYS | Conciergerie Airbnb & Académie</title>
    
    <!-- 1. Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React Libraries (Logic) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 3. Babel (Bach l-browser y-fham React) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Fallback l-icons bach may-kbiroch ila t3atle React */
        svg {
            max-width: 100%;
            height: auto;
        }

        .shadow-3xl {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.1);
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }

        .animate-bounce-slow {

<body>
    <div id="root"></div>

    <script type="text/babel">

                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
                style={{ minWidth: size, minHeight: size }}
            >
                {children}
            </svg>
        );

        const Icons = {
            Home: (props) => <Icon {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22" /></Icon>,
            Key: (props) => <Icon {...props}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5" /></Icon>,
            GraduationCap: (props) => <Icon {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5" /></Icon>,
            CheckCircle: (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01" /></Icon>,
            TrendingUp: (props) => <Icon {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12" /></Icon>,
            ShieldCheck: (props) => <Icon {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10" /></Icon>,
            Star: (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></Icon>,
            Menu: (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18" /></Icon>,

            MessageSquare: (props) => <Icon {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></Icon>

        const WhatsAppIcon = ({ className = "w-6 h-6" }) => (

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });

            };

            const phoneNumber = "212661389143";
            const whatsappBaseUrl = `https://wa.me/${phoneNumber}`;
            const whatsappAcademyUrl = `https://wa.me/${phoneNumber}?text=JE%20VEUX%20REJOINDRE%20L%20ACADEMIE`;
            const whatsappPropertyUrl = `https://wa.me/${phoneNumber}?text=GERER%20MA%20propriété`;
            const staticHeroImage = "https://i.postimg.cc/Y0H3mNrZ/design-interieur-appartement-luxe-moderne-rendu-3d-674881-1114-jpg.avif";

                        <WhatsAppIcon className="w-8 h-8" />
                        <span className="max-w-0 overflow-hidden group-hover:max-w-xs group-hover:ml-2 transition-all duration-300 font-bold whitespace-nowrap uppercase text-[10px] tracking-widest">WhatsApp</span>
                    </a>

                    {/* Header */}
                    <nav className="fixed w-full bg-white/95 backdrop-blur-md z-50 border-b border-gray-100">

                            <div className="flex justify-between h-20 items-center">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => scrollTo('home')}>
                                    <div className="bg-slate-900 p-2 rounded-lg">
                                        <Icons.Home className="text-white w-5 h-5" />

                                    <button onClick={() => scrollTo('formation')} className="hover:text-rose-600 transition">Académie</button>
                                    <button onClick={() => scrollTo('why-us')} className="hover:text-rose-600 transition">Expertise</button>

                            </div>

                                <button onClick={() => scrollTo('why-us')} className="text-left font-bold uppercase text-sm py-2">Expertise</button>
                                <button onClick={() => scrollTo('contact')} className="bg-rose-600 text-white px-6 py-4 rounded-xl font-bold text-center text-sm">Contactez-nous</button>
                            </div>
                        )}
                    </nav>

                    {/* Hero */}
                    <section id="home" className="pt-32 pb-20 px-4 bg-gradient-to-b from-rose-50/20 to-white">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-12 lg:gap-16">
                            <div className="lg:w-1/2 space-y-6 md:space-y-8 text-center lg:text-left">
                                <div className="inline-flex items-center gap-2 bg-white border border-rose-100 text-rose-600 px-4 py-1.5 rounded-full font-bold text-[10px] uppercase tracking-widest shadow-sm">
                                    <Icons.Star size={12} className="fill-rose-600" />
                                    <span>Conciergerie de Luxe & Académie 2026</span>
                                </div>
                                <h1 className="text-4xl md:text-6xl lg:text-7xl font-black leading-[1.1] text-slate-950">
                                    Maximisez vos revenus <span className="text-rose-600">Airbnb</span> sans effort.
                                </h1>
                                <p className="text-lg md:text-xl text-slate-600 max-w-xl mx-auto lg:mx-0 leading-relaxed font-medium">
                                    Confiez-nous la gestion complète de vos biens ou apprenez à bâtir votre empire de location courte durée en 2026.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start pt-2">
                                    <button onClick={() => window.open(whatsappPropertyUrl, '_blank')} className="bg-slate-950 text-white px-8 py-4 rounded-2xl font-bold text-base hover:bg-slate-800 transition shadow-xl">
                                        Gérer ma propriété

                                        Rejoindre l'Académie
                                    </button>
                                </div>
                            </div>
                            <div className="lg:w-1/2 relative w-full mt-8 lg:mt-0">
                                <div className="absolute -inset-4 bg-rose-500/5 rounded-[3rem] blur-2xl"></div>
                                <div className="relative w-full h-[350px] md:h-[500px] overflow-hidden rounded-[2.5rem] shadow-2xl bg-slate-100">
                                    <img src={staticHeroImage} alt="Luxury Interior" className="w-full h-full object-cover transform hover:scale-105 transition-transform duration-700 ease-out" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="services" className="py-24 bg-white border-y border-gray-50">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h2 className="text-3xl md:text-5xl font-black mb-12 uppercase tracking-tighter">Gestion Complète A à Z</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-left">
                                {[

                                    { title: "Conciergerie 24/7", icon: <Icons.Key />, desc: "Accueil personnalisé et assistance de tous vos voyageurs." },

                                    { title: "Support Voyageurs", icon: <Icons.MessageSquare />, desc: "Réponse instantanée pour garantir des notes 5 étoiles." }

                                    <div key={i} className="bg-slate-50 p-8 md:p-10 rounded-[2.5rem] hover:bg-white hover:shadow-2xl transition-all duration-300 group border border-transparent hover:border-rose-100">
                                        <div className="w-12 h-12 bg-white text-rose-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-rose-600 group-hover:text-white transition-colors">
                                            {s.icon}
                                        </div>
                                        <h3 className="text-xl md:text-2xl font-black mb-4">{s.title}</h3>
                                        <p className="text-slate-500 font-medium leading-relaxed text-sm md:text-base">{s.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Académie */}
                    <section id="formation" className="py-20 px-4 max-w-7xl mx-auto">
                        <div className="bg-slate-950 rounded-[3rem] md:rounded-[4rem] p-8 md:p-16 flex flex-col lg:flex-row items-center gap-12 relative overflow-hidden">
                            <div className="lg:w-1/2 space-y-6 md:space-y-8 relative z-10 text-white text-center lg:text-left">
                                <div className="inline-flex items-center gap-2 bg-rose-600/20 text-rose-400 px-5 py-2 rounded-full font-bold text-[10px] uppercase tracking-[0.2em]">
                                    <Icons.GraduationCap size={16} />
                                    <span>Airbnb Masterclass 2026</span>
                                </div>
                                <h2 className="text-4xl md:text-6xl font-black italic leading-tight">Devenez expert Airbnb.</h2>
                                <p className="text-slate-400 text-lg md:text-xl font-medium">Apprenez nos méthodes exclusives pour lancer votre agence sans posséder d'appartement en 2026.</p>
                                <button onClick={() => window.open(whatsappAcademyUrl, '_blank')} className="bg-rose-600 text-white px-10 py-4 rounded-2xl font-black text-lg hover:bg-rose-700 transition flex items-center gap-4 shadow-xl shadow-rose-900/40 mx-auto lg:mx-0">
                                    <WhatsAppIcon className="w-6 h-6" /> Rejoindre l'Académie
                                </button>
                            </div>
                            <div className="lg:w-1/2 bg-white rounded-[2rem] p-8 md:p-10 shadow-2xl text-slate-900 w-full relative z-10">
                                <h4 className="font-black text-xl md:text-2xl uppercase mb-8 tracking-tighter">Programme 2026</h4>
                                <div className="space-y-3 mb-8">
                                    {["Stratégie de Marché & Niche", "Acquisition & Contrats Juridiques", "Outils d'Automatisation", "Scaling & Croissance Agence"].map((m, i) => (
                                        <div key={i} className="flex items-center gap-4 p-4 border border-gray-100 rounded-xl font-bold hover:bg-slate-50 transition text-sm">
                                            <span className="text-slate-400">0{i+1}</span> {m}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center pt-6 border-t font-black">
                                    <div>
                                        <p className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Tarif Spécial 2026</p>
                                        <p className="text-2xl md:text-3xl tracking-tighter">1 699 MAD</p>
                                    </div>
                                    <div className="text-rose-600 text-[10px] font-black uppercase">Places Limitées</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Expertise Section */}
                    <section id="why-us" className="py-24 max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div className="space-y-6 text-center lg:text-left">
                            <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-tight">
                                Expertise <br/> <span className="text-rose-600 underline underline-offset-8 decoration-rose-200">Lahlou Luxury Stays</span>
                            </h2>
                            <div className="space-y-4 pt-4 text-left inline-block lg:block">
                                {["Transparence totale sur vos revenus", "Prestige & Branding Premium", "Sécurité & Contrôle des Voyageurs", "Paiements Accélérés et Directs"].map((t, i) => (
                                    <div key={i} className="flex items-center gap-4 font-black text-base md:text-lg">
                                        <Icons.CheckCircle className="text-rose-600 shrink-0" size={20} />
                                        <span>{t}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 md:gap-6 lg:gap-8">
                            <div className="bg-slate-50 p-6 md:p-10 rounded-[2.5rem] text-center border border-slate-100 font-black shadow-sm group hover:border-rose-200 transition-colors">
                                <p className="text-3xl md:text-5xl tracking-tighter text-slate-900">+500</p>
                                <p className="text-[8px] md:text-[10px] text-slate-400 uppercase tracking-widest mt-2">Satisfaits</p>
                            </div>
                            <div className="bg-rose-600 p-6 md:p-10 rounded-[2.5rem] text-center text-white font-black shadow-xl shadow-rose-200">
                                <p className="text-3xl md:text-5xl tracking-tighter">5.0</p>
                                <p className="text-[8px] md:text-[10px] text-rose-200 uppercase tracking-widest mt-2">Note Guests</p>
                            </div>
                            <div className="bg-slate-950 p-6 md:p-10 rounded-[2.5rem] text-center text-white font-black shadow-2xl">
                                <p className="text-3xl md:text-5xl tracking-tighter">58</p>
                                <p className="text-[8px] md:text-[10px] text-slate-500 uppercase tracking-widest mt-2">Biens Gérés</p>
                            </div>
                            <div className="bg-white p-6 md:p-10 rounded-[2.5rem] border border-slate-100 text-center font-black shadow-sm">
                                <p className="text-3xl md:text-5xl text-rose-600 tracking-tighter">24h</p>
                                <p className="text-[8px] md:text-[10px] text-slate-400 uppercase tracking-widest mt-2">Réactivité</p>

                        </div>

                        <div className="flex flex-col items-center gap-6">
                            <div className="bg-slate-950 p-3 rounded-2xl"><Icons.Home className="text-white w-6 h-6" /></div>
                            <span className="text-2xl md:text-3xl font-black uppercase italic tracking-tighter">Lahlou <span className="text-rose-600">Luxury Stays</span></span>
                        </div>
                        
                        <div className="flex flex-col md:flex-row justify-center items-center gap-8 md:gap-16 lg:gap-24 px-4">
                            <a href={whatsappBaseUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 group">
                                <WhatsAppIcon className="w-10 h-10 md:w-12 md:h-12 text-[#25D366] group-hover:scale-110 transition-transform" />
                                <div className="text-left">
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">WhatsApp Direct</p>
                                    <p className="text-xl md:text-2xl font-bold tracking-tight">+212 6 61 38 91 43</p>
                                </div>
                            </a>
                            <div className="flex items-center gap-4">
                                <div className="bg-rose-50 p-3 rounded-full text-rose-600"><Icons.MapPin size={24} /></div>
                                <div className="text-left font-black">

                                </div>

                        </div>
                        <div className="pt-12 border-t border-gray-50 max-w-2xl mx-auto px-4">
                            <p className="text-slate-300 text-[8px] md:text-[10px] font-black uppercase tracking-[0.4em] md:tracking-[0.6em]">© 2026 Lahlou Luxury Stays. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const renderApp = () => {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderApp);
        } else {
            renderApp();
        }
    </script>
</body>
</html>
